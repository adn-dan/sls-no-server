name: Build APK

# Déclenché sur chaque push (toutes les branches), sur les tags v*, et manuellement.
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # AGP 9.0.0 nécessite Java 21.
      - name: Configuration JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Cache le wrapper Gradle et les dépendances pour accélérer les builds suivants.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle', 'app/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      # SDK 36 (Android 16) n'est pas toujours pré-installé sur le runner.
      - name: Accepter les licences Android SDK
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Installer Android SDK 36
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Compilation du debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # L'APK sera téléchargeable depuis l'onglet Actions > run > Artifacts.
      - name: Upload de l'APK en artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error

      # Extrait le versionName depuis app/build.gradle pour nommer la release sur main.
      - name: Extraire la version
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        id: get_version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*versionName "\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      # Crée une GitHub Release avec l'APK sur les tags v* ou les merges sur main.
      - name: Créer une Release GitHub
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.get_version.outputs.version }}
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
